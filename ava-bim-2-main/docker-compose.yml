services:
  # Api Gateway (0)
  gateway-app:
    build:
      context: ./api-gateway
      target: development
    env_file:
      - ./api-gateway/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
    volumes:
      - ./api-gateway:/usr/src/app
      - /usr/src/app/node_modules

  # Serviço de usuários (1)
  users-app:
    build:
      context: ./user-service
      target: development
    env_file:
      - ./user-service/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3001:3000"
    volumes:
      - ./user-service:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - users-db

  users-db:
    image: mongo
    env_file:
      - ./user-service/.env
    volumes:
      - users-data:/data/db

  # Serviço de Autenticação (2)
  auth-app:
    build:
      context: ./auth-service
      target: development
    env_file:
      - ./auth-service/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3002:3000"
    volumes:
      - ./auth-service:/usr/src/app
      - /usr/src/app/node_modules

  # Serviço de Restaurantes (3)
  restaurant-app:
    build:
      context: ./restaurant-service
      target: development
    env_file:
      - ./restaurant-service/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3003:3000"
    volumes:
      - ./restaurant-service:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - restaurants-db

  restaurants-db:
    image: mongo
    env_file:
      - ./restaurant-service/.env
    volumes:
      - restaurants-data:/data/db

volumes:
  users-data:
  restaurants-data:
