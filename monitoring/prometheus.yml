global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway-app:3000']

  - job_name: 'users'
    static_configs:
      - targets: ['users-app:3000']

  - job_name: 'auth'
    static_configs:
      - targets: ['auth-app:3000']

  - job_name: 'orders'
    static_configs:
      - targets: ['orders-app:3000']

  - job_name: 'delivery'
    static_configs:
      - targets: ['delivery-app:3000']

  - job_name: 'restaurant'
    static_configs:
      - targets: ['restaurant-app:3000']

  - job_name: 'tracking'
    static_configs:
      - targets: ['tracking-app:3000']

  - job_name: 'payment'
    static_configs:
      - targets: ['payment-app:3000']

  - job_name: 'menu'
    static_configs:
      - targets: ['menu-app:3000']
