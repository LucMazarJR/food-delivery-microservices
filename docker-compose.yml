services:
  # Api Gateway (0)
  gateway-app:
    build:
      context: ./api-gateway
      target: development
    env_file:
      - ./api-gateway/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
    volumes:
      - ./api-gateway:/usr/src/app
      - /usr/src/app/node_modules

  # Serviço de usuários (1)
  users-app:
    build:
      context: ./user-service
      target: development
    env_file:
      - ./user-service/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3001:3000"
    volumes:
      - ./user-service:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - users-db

  users-db:
    image: mongo
    env_file:
      - ./user-service/.env
    volumes:
      - users-data:/data/db

  # Serviço de Autenticação (2)
  auth-app:
    build:
      context: ./auth-service
      target: development
    env_file:
      - ./auth-service/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3002:3000"
    volumes:
      - ./auth-service:/usr/src/app
      - /usr/src/app/node_modules

  # Serviço de Pedidos (3)
  orders-app:
    build:
      context: ./orders-service
      target: development
    env_file:
      - ./orders-service/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3003:3000"
    volumes:
      - ./orders-service:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - orders-db

  orders-db:
    image: mongo
    env_file:
      - ./orders-service/.env
    volumes:
      - orders-data:/data/db

  # Serviço de Entrega (4)
  delivery-app:
    build:
      context: ./delivery-service
      target: development
    env_file:
      - ./delivery-service/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3004:3000"
    volumes:
      - ./delivery-service:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - delivery-db

  delivery-db:
    image: mongo
    env_file:
      - ./delivery-service/.env
    volumes:
      - delivery-data:/data/db

  # Serviço de Restaurantes (5)
  restaurant-app:
    build:
      context: ./restaurant-service
      target: development
    env_file:
      - ./restaurant-service/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3005:3000"
    volumes:
      - ./restaurant-service:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - restaurant-db

  restaurant-db:
    image: mongo
    env_file:
      - ./restaurant-service/.env
    volumes:
      - restaurant-data:/data/db

  # Serviço de Rastreamento (6)
  tracking-app:
    build:
      context: ./tracking-service
      target: development
    env_file:
      - ./tracking-service/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3006:3000"
    volumes:
      - ./tracking-service:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - tracking-db

  tracking-db:
    image: mongo
    env_file:
      - ./tracking-service/.env
    volumes:
      - tracking-data:/data/db

  # Serviço de Pagamentos (7)
  payment-app:
    build:
      context: ./payment-service
      target: development
    env_file:
      - ./payment-service/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3007:3000"
    volumes:
      - ./payment-service:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - payment-db

  payment-db:
    image: mongo
    env_file:
      - ./payment-service/.env
    volumes:
      - payment-data:/data/db

  # Serviço de Cardápio (8)
  menu-app:
    build:
      context: ./menu-service
      target: development
    env_file:
      - ./menu-service/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3008:3000"
    volumes:
      - ./menu-service:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - menu-db

  menu-db:
    image: mongo
    env_file:
      - ./menu-service/.env
    volumes:
      - menu-data:/data/db

  # Monitoramento
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3009:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  users-data:
  orders-data:
  delivery-data:
  restaurant-data:
  tracking-data:
  payment-data:
  menu-data:
  prometheus-data:
  grafana-data:
